name: Daily Clipper Automation

on:
  # Menjalankan bot secara otomatis setiap hari pada jam 00:00 UTC (07:00 WIB)
  schedule:
    - cron: '0 0 * * *'
  
  # Memunculkan tombol "Run workflow" di GitHub agar Anda bisa klik jalankan manual kapan saja
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengunduh seluruh kode proyek Anda dari repositori GitHub ke server virtual
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Menyiapkan lingkungan Python versi 3.10 di server virtual
    - name: Set up Python
      uses: actions/uses/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Menginstal semua library Python yang dibutuhkan proyek Anda
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. KRUSIAL: Mengubah teks rahasia dari GitHub Secrets menjadi file client_secret.json asli di server
    - name: Recreate client_secret.json from Secrets
      env:
        SECRET_DATA: ${{ secrets.CLIENT_SECRET_JSON }}
      run: |
        echo "$SECRET_DATA" > client_secret.json

    # 5. Mengeksekusi skrip utama untuk mulai scraping dan processing
    - name: Run main script
      run: |
        python main.py
